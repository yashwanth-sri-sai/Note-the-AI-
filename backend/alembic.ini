# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate new migration files
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path path, space-separated, used to search for modules
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# version path separator; as of Alembic 1.3, this defaults to os.pathsep
# version_locations = %(here)s/bar:%(here)s/bat

# logging configuration
# [loggers], [handlers], [formatters] etc. are defined below.

[post_write_hooks]
# post_write_hooks defines scripts or methods that are run after a new migration script is generated.
# format:
# hooks = list of hook names
# hook_name.type = type of hook (e.g. console_scripts, etc)
# hook_name.entrypoint = the console script entry point
# hook_name.options = options for the hook
# example:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILE

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
